# Companion consumer for merlinus-ai-jobs (durable Async AI).
# Deploy separately: npx wrangler deploy -c workers/ai-jobs-consumer/wrangler.toml
#
# Prerequisites:
#   npx wrangler queues create merlinus-ai-jobs
#   npx wrangler queues create merlinus-ai-jobs-dlq
#   npx wrangler secret put AI_QUEUE_CONSUMER_SECRET  (must match main Worker)
#   APP_BASE_URL = https://your-production-host

name = "merlinus-ai-jobs-consumer"
main = "src/index.ts"
compatibility_date = "2025-08-05"
compatibility_flags = ["nodejs_compat"]

[[queues.consumers]]
queue = "merlinus-ai-jobs"
max_batch_size = 5
max_batch_timeout = 15
max_retries = 3
dead_letter_queue = "merlinus-ai-jobs-dlq"

[vars]
# Override in dashboard for production
APP_BASE_URL = "http://127.0.0.1:3000"
