# Cloudflare Workers deploy for Merlinus (Next.js via OpenNext)
#
# `npm run build` runs Next.js then OpenNext (`build:opennext` → .open-next/).
# Deploy: `npm run deploy`  OR  `npm run build && npx wrangler deploy`
#
# Cloudflare dashboard build command should be: npm run build
# (Do not use plain `next build` alone — Wrangler needs .open-next/worker.js.)
#
# D1 binding name MUST stay `DB` (matches src/lib/d1.ts + PrismaD1(env.DB)).
#
# Migrations (not prisma migrate deploy):
#   npx wrangler d1 migrations apply merlinus-d1 --local
#   npx wrangler d1 migrations apply merlinus-d1 --remote

name = "merlinus-platform"
# OpenNext Worker entry (produced by `npm run build` / `build:opennext`)
main = ".open-next/worker.js"
compatibility_date = "2025-08-05"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Workers Observability (dashboard logs) — must come after top-level Worker keys in TOML
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# Static assets from the OpenNext build (not .vercel/output — that is Vercel-only)
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Prisma / app code expects binding name "DB" (src/lib/d1.ts).
# Dashboard name may show as "apex"; uuid is authoritative.
[[d1_databases]]
binding = "DB"
database_name = "merlinus-d1"
database_id = "ebc1ac5c-c35c-464c-9e18-cf499c03ffba"
migrations_dir = "migrations"

# Self-reference required by OpenNext for some Next.js features
[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "merlinus-platform"

# Object storage for images, video MPI, voice media (replaces Vercel Blob).
# Cloudflare R2 bucket names must be lowercase (API rejects "Apex" → use "apex").
[[r2_buckets]]
binding = "APEX_R2"
bucket_name = "apex"

# Distributed rate limiting — merlinus-rate-limit namespace (native Workers KV)
[[kv_namespaces]]
binding = "KV_STORE"
id = "95aae52266f74a31bf715071664b24b9"
