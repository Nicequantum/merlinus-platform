name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Cloudflare D1 is SQLite — no Postgres service. Local tests use a file DB.
    env:
      NODE_ENV: test
      SESSION_SECRET: ci-test-session-secret-min-32-chars
      DATA_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      SEARCH_HMAC_KEY: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
      # Prisma sqlite tooling only (runtime D1 uses wrangler binding DB)
      DATABASE_URL: file:./prisma/dev.db
      BLOB_READ_WRITE_TOKEN: ci-blob-token
      KV_REST_API_URL: https://ci-kv.example.com
      KV_REST_API_TOKEN: ci-kv-token
      GROK_API_KEY: ci-grok-key
      NEXT_PUBLIC_SENTRY_DSN: https://fake@o0.ingest.sentry.io/0
      ADMIN_SEED_PASSWORD: Oceanic1735!
      TECH_SEED_PASSWORD: Oceanic1735!

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: file:./prisma/dev.db

      # Do NOT use `prisma migrate deploy` with D1.
      # Schema is applied via wrangler d1 migrations in production;
      # for CI file SQLite we push the current schema.
      - name: Apply schema to local SQLite
        run: npx prisma db push --accept-data-loss --skip-generate
        env:
          DATABASE_URL: file:./prisma/dev.db

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # H-2: Gate tenant isolation and route flows on every merge (requires seeded accounts).
      - name: Seed database for integration tests
        run: npm run db:seed
        env:
          DATABASE_URL: file:./prisma/dev.db

      - name: Integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          CI: true
          DATABASE_URL: file:./prisma/dev.db
          # Fake KV URLs break live probes; health checks skip KV/Grok network probes in test/CI.
          KV_REST_API_URL: ''
          KV_REST_API_TOKEN: ''

      - name: Production build
        run: npm run build
        env:
          DATABASE_URL: file:./prisma/dev.db

      - name: Ready to deploy
        run: npm run ready-to-deploy
        env:
          NODE_ENV: production
          VERCEL_ENV: production
          DATABASE_URL: file:./prisma/dev.db
