<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320" role="img" aria-label="Voice modes wireframe">
  <rect width="480" height="320" fill="#0b0d12"/>
  <text x="24" y="36" fill="#e8ecf4" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Voice modes</text>
  <rect x="24" y="52" width="200" height="120" rx="10" fill="#12161f" stroke="#00A0E3"/>
  <text x="40" y="80" fill="#00A0E3" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Tap to toggle</text>
  <text x="40" y="100" fill="#9aa3b5" font-family="system-ui,sans-serif" font-size="10">Tap mic → start</text>
  <text x="40" y="116" fill="#9aa3b5" font-family="system-ui,sans-serif" font-size="10">Tap mic → stop</text>
  <circle cx="180" cy="140" r="18" fill="#00A0E3"/>
  <text x="172" y="145" fill="#0b0d12" font-family="system-ui,sans-serif" font-size="14">🎤</text>
  <rect x="256" y="52" width="200" height="120" rx="10" fill="#12161f" stroke="#4ade80"/>
  <text x="272" y="80" fill="#4ade80" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Push-to-talk</text>
  <text x="272" y="100" fill="#9aa3b5" font-family="system-ui,sans-serif" font-size="10">Hold mic while speaking</text>
  <text x="272" y="116" fill="#9aa3b5" font-family="system-ui,sans-serif" font-size="10">Release to stop</text>
  <rect x="24" y="190" width="432" height="48" rx="8" fill="#151922"/>
  <text x="40" y="218" fill="#e8ecf4" font-family="system-ui,sans-serif" font-size="11">Technician notes</text>
  <circle cx="420" cy="214" r="16" fill="#00A0E3"/>
  <text x="413" y="219" fill="#0b0d12" font-size="12">🎤</text>
  <rect x="388" y="198" width="24" height="24" rx="6" fill="#2a3142"/>
  <text x="394" y="215" fill="#e8ecf4" font-size="11">✋</text>
  <text x="24" y="268" fill="#9aa3b5" font-family="system-ui,sans-serif" font-size="10">Hand icon switches between tap-toggle and push-to-talk</text>
</svg>